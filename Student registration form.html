<!Doctype html>
<html>
<head>
<title>student registration form</title>
</head>
<body bgcolor="mistyrose">
<form>
<table align="center" width="500" cell padding="10">
<tr>
<td colspan="2" align="center">
<h3> Student registration form</h3>
</td>
</tr>
<tr>
<td>username:</td>
<td>
<input type="text" size="20" placeholder="firstname" value="Deepika" disabled>
-
<input type="text" placeholder="last name">
</td>
</tr>
<tr>
<td >Father's name:</td>
<td>
<input type="text" size="20">
</td>
</tr>
<tr>
<td >Date of birth :</td>
<td>
<input type="text" size="2" placeholder="day" maxlength="2">
-
<input type="text" size="2" placeholder="month"maxlength="2">
-
<input type="text" size="2" placeholder="year" maxlength="4">
<i>(DD-MM-Year)</i>
</td>
</tr>
<tr>
<td>Mobile no. :</td>
<td><input type="text" size="1" value="+91" readonly>
-
<input type="number" size="5" >
</tr>
<tr>
<td>Email id:</td>
<td>
<input type="email" size="20" placeholder="enter email" required>
</td>
</tr>

<tr>
<td>password:</td>
<td>
<input type="password" placeholder="password">
</td>
</tr>

<tr>
<td>Gender :</td>
<td>
<input type="radio" name="gender" >Male<br>

<input type="radio" name="gender" >Female
</td>
</tr>
<tr>
<td>Department :</td>
<td>
<select>
<option value="B.tech">CSE</option>
<option value="B.tech">ECE</option>
<option value="B.tech">EEE</option>
<option value="B.tech">Civil</option>
<option value="B.tech">chemical</option>
<option value="B.tech">MME</option>
<option value="B.tech">Mechanical</option>
</select>
</td>
</tr>

<tr>
<td>course : </td>
<td>
<select>
<option >......select course...</option>
<option >python</option>
<option >java</option>
<option >DSA</option>
<option>HTML</option>
<option>CSS</option>
<option >Java script</option>
</select>

<tr>
<td>Student photo:</td>
<td>
<input type="file" size="29"  multiple required>
</td>
</tr>
<tr>
<td>city : </td>
<td><input type="text"></td>
</tr>
<tr>
<td>Address :</td>
<td>
<textarea name="address" placeholder="Enter Address">
</textarea>
</td>
</tr>

<tr>
<td colspan="2">Do you agree all terms and polices?</td>
<td ><input type="checkbox" checked required>Yes, I agree</td>
</tr>

<tr>
<td colspan="2"  align="center">
<input type="submit" value="Register"/>
</td>
</tr>


</form>
</body>
</html>
